[tool.poetry]
name = "dev"
version = "0.0.1"
description = "pivlab gcip"
authors = ["PivLab Tech"]
package-mode = false

[tool.poetry.dependencies]
python = ">=3.11,<4.0"
pydantic = "^2.13.4"

[tool.black]
line-length = 120
target-version = ['py311']

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
