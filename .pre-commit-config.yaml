repos:
  - repo: local
    hooks:
      - id: build-gitlab-ci -t immortal-1
        name: generate .gitlab-ci.yml
        entry: poetry run -- gcip2 -- build-gitlab-ci
        language: system
        pass_filenames: false
        always_run: true
      - id: isort
        name: isort
        entry: poetry run isort
        description: Run isort
        language: system
        types: [python]
      - id: black
        name: black
        entry: poetry run black
        description: Run black
        language: system
        types: [python]
